{% extends "base.html" %}

{% block content %}

<h1 class="text-3xl font-bold mb-8">Your Projects</h1>

<div class="flex justify-end mb-6">
    <a href="{{ url_for('create_project') }}">
        <button class="bg-primary px-4 py-2 rounded-lg">
            + New Project
        </button>
    </a>
</div>

<div class="grid md:grid-cols-2 gap-6">
    {% for project in projects %}
    <div class="bg-dark-800 p-5 rounded-xl hover:scale-105 transition">
        
        <h2 class="text-xl mb-2">{{ project.name }}</h2>

        <a href="{{ url_for('project', project_id=project.id) }}" class="text-primary">
            Open →
        </a>

        <p class="mt-2 text-sm">
            {% if project.user_id == current_user.id %}
                (Owner)
            {% else %}
                (Collaborator)
            {% endif %}
        </p>

    </div>
    {% endfor %}
</div>

{% endblock %}
