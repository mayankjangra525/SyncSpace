{% extends "base.html" %}

{% block content %}

<h1 class="text-xl mb-4">💻 Code Editor</h1>

<div class="flex gap-4">

    <!-- 📂 FILE LIST -->
    <div class="w-1/4 bg-dark-800 p-3 rounded-xl">

        <h3 class="mb-2">Project Files</h3>

        {% for file in project.files %}
        <div class="cursor-pointer text-sm hover:text-primary"
             onclick="openFile('{{ file.id }}')">
            {{ file.original_name }} (v{{ file.version }})
        </div>
        {% endfor %}

        <hr class="my-3">

        <button onclick="createNewFile()"
                class="bg-primary px-2 py-1 text-sm rounded">
            + New File
        </button>
        <hr class="my-3">

<h4 class="text-sm mb-2">Upload from System</h4>

<input type="file" id="localFile"
       class="text-xs mb-2 block">

<button onclick="loadLocalFile()"
        class="bg-blue-600 px-2 py-1 text-xs rounded">
    Open File
</button>

    </div>

    <!-- 💻 EDITOR -->
    <div class="flex-1">
        <div id="editor" style="height:70vh;"></div>

        <div class="mt-3 flex gap-3">
            <button onclick="saveAsVersion()"
                    class="bg-green-600 px-3 py-1 rounded">
                Save as Version
            </button>

            <button onclick="saveToDrive()"
                    class="bg-blue-600 px-3 py-1 rounded">
                Save to Drive
            </button>
        </div>
    </div>
    

</div>
<script>
function loadLocalFile() {
    const input = document.getElementById("localFile");
    const file = input.files[0];

    if (!file) {
        alert("Please select a file ❌");
        return;
    }

    // 🔍 Optional: restrict file types
    const allowed = ["txt", "py", "js", "html", "css"];
    const ext = file.name.split('.').pop().toLowerCase();

    if (!allowed.includes(ext)) {
        alert("Unsupported file type ❌");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
        const content = e.target.result;

        // 🔥 LOAD INTO MONACO
        editor.setValue(content);

        // Optional: change language dynamically
        setEditorLanguage(ext);
    };

    reader.readAsText(file);
}
</script>
{% endblock %}
