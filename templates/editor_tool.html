{% extends "base.html" %}

{% block content %}

<h1 class="text-xl mb-4">💻 Code Editor</h1>

<div class="flex gap-4">

    <!-- 📂 FILE LIST -->
    <div class="w-1/4 bg-dark-800 p-3 rounded-xl">

        <h3 class="mb-2">Project Files</h3>

        {% for file in project.files %}
        <div class="cursor-pointer text-sm hover:text-primary"
             onclick="openFile('{{ file.id }}')">
            {{ file.original_name }} (v{{ file.version }})
        </div>
        {% endfor %}

        <hr class="my-3">

        <button onclick="createNewFile()"
                class="bg-primary px-2 py-1 text-sm rounded">
            + New File
        </button>
        <hr class="my-3">

<h4 class="text-sm mb-2">Upload from System</h4>

<input type="file" id="localFile"
       class="text-xs mb-2 block">

<button onclick="loadLocalFile()"
        class="bg-blue-600 px-2 py-1 text-xs rounded">
    Open File
</button>

    </div>

    <!-- 💻 EDITOR -->
    <div class="flex-1">
        <div id="editor" style="height:70vh;"></div>

        <div class="mt-3 flex gap-3">
            <button onclick="saveAsVersion()"
                    class="bg-green-600 px-3 py-1 rounded">
                Save as Version
            </button>

            <button onclick="saveToDrive()"
                    class="bg-blue-600 px-3 py-1 rounded">
                Save to Drive
            </button>
        </div>
    </div>
    

</div>
<!-- MONACO LOADER -->
<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>

<script>
let editor;
let currentFileId = null;
let currentFileName = null;

// 🔥 LOAD MONACO
require.config({
    paths: {
        vs: "https://unpkg.com/monaco-editor@0.44.0/min/vs"
    }
});

require(["vs/editor/editor.main"], function () {

    editor = monaco.editor.create(document.getElementById("editor"), {
        value: "",
        language: "javascript",
        theme: "vs-dark",
        automaticLayout: true,
        fontSize: 14,
        minimap: { enabled: true }
    });

    console.log("Editor Loaded ✅");
});

// 🔥 LANGUAGE SWITCH
function setEditorLanguage(ext) {
    let lang = "plaintext";

    if (ext === "py") lang = "python";
    else if (ext === "js") lang = "javascript";
    else if (ext === "html") lang = "html";
    else if (ext === "css") lang = "css";

    if (editor) {
        monaco.editor.setModelLanguage(editor.getModel(), lang);
    }
}

// 🔥 LOAD LOCAL FILE
function loadLocalFile() {
    const input = document.getElementById("localFile");
    const file = input.files[0];

    if (!file) {
        alert("Select file ❌");
        return;
    }

    if (!editor) {
        alert("Editor not ready ❌");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
        editor.setValue(e.target.result);

        currentFileName = file.name;
        currentFileId = null; // IMPORTANT

        const ext = file.name.split('.').pop().toLowerCase();
        setEditorLanguage(ext);
    };

    reader.readAsText(file);
}

// 🔥 OPEN PROJECT FILE
function openFile(fileId) {
    fetch(`/editor/file/${fileId}`)
        .then(res => res.json())
        .then(data => {

            if (data.error) {
                alert(data.error);
                return;
            }

            if (!editor) {
                alert("Editor not ready ❌");
                return;
            }

            editor.setValue(data.content);

            // 🔥 IMPORTANT FIX
            currentFileId = fileId;
            currentFileName = null;

            console.log("Opened file:", data.filename);
        })
        .catch(err => console.error(err));
}

// 🔥 SAVE LOGIC
function saveAsVersion() {

    if (!editor) {
        alert("Editor not ready ❌");
        return;
    }

    const code = editor.getValue();
    const message = prompt("Enter commit message:");

    if (!message) {
        alert("Commit message required ❌");
        return;
    }

    // ✅ EXISTING FILE
    if (currentFileId) {

        fetch(`/editor/save/${currentFileId}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code,
                message: message
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("✅ Saved as new version!");
            } else {
                alert("❌ Error saving");
            }
        });

    }

    // ✅ NEW UPLOADED FILE
    else if (currentFileName) {

        fetch(`/editor/save_new/{{ project.id }}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code,
                filename: currentFileName,
                message: message
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("✅ File added as new project file!");
            } else {
                alert("❌ Error saving");
            }
        });

    }

    else {
        alert("No file to save ❌");
    }
}

function createNewFile() {
    const filename = prompt("Enter file name (e.g. app.py):");

    if (!filename) {
        alert("File name required ❌");
        return;
    }

    if (!editor) {
        alert("Editor not ready ❌");
        return;
    }

    // 🔥 CLEAR EDITOR
    editor.setValue("");

    // 🔥 SET STATE
    currentFileId = null;
    currentFileName = filename;

    // 🔥 SET LANGUAGE
    const ext = filename.split('.').pop().toLowerCase();
    setEditorLanguage(ext);

    console.log("New file created:", filename);
}

function saveToDrive() {

    if (!editor) {
        alert("Editor not ready ❌");
        return;
    }

    const code = editor.getValue();

    let filename = currentFileName;

    // if opened from project → ask new name
    if (!filename) {
        filename = prompt("Enter file name for drive:");
    }

    if (!filename) {
        alert("Filename required ❌");
        return;
    }

    fetch("/drive/save", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            code: code,
            filename: filename
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("✅ Saved to Drive!");
        } else {
            alert("❌ Error saving");
        }
    });
}

</script>
{% endblock %}
