{% extends "base.html" %}

{% block content %}

<h1 class="text-xl mb-4">💻 Editor - {{ file.original_name }}</h1>

<!-- EDITOR -->
<div id="editor" style="height:70vh; border-radius:10px;"></div>


<!-- ACTION BUTTONS -->
<div class="mt-4 flex gap-3">
    <button onclick="saveCode()"
            class="bg-primary px-4 py-2 rounded-lg hover:scale-105 transition">
        💾 Save
    </button>

    <a href="{{ url_for('project', project_id=file.project_id) }}"
       class="px-4 py-2 bg-gray-600 rounded-lg">
        Back
    </a>
</div>

<!-- MONACO LOADER -->
<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>

<script>
let editor;
let currentFileId = null;
let currentFileName = null;

// 🔥 LOAD MONACO
require.config({
    paths: {
        vs: "https://unpkg.com/monaco-editor@0.44.0/min/vs"
    }
});

require(["vs/editor/editor.main"], function () {

    editor = monaco.editor.create(document.getElementById("editor"), {
        value: "",
        language: "javascript",
        theme: "vs-dark",
        automaticLayout: true,
        fontSize: 14,
        minimap: { enabled: true }
    });

    console.log("Editor Loaded ✅");
});

// 🔥 LANGUAGE SWITCH
function setEditorLanguage(ext) {
    let lang = "plaintext";

    if (ext === "py") lang = "python";
    else if (ext === "js") lang = "javascript";
    else if (ext === "html") lang = "html";
    else if (ext === "css") lang = "css";

    if (editor) {
        monaco.editor.setModelLanguage(editor.getModel(), lang);
    }
}

// 🔥 LOAD LOCAL FILE
function loadLocalFile() {
    const input = document.getElementById("localFile");
    const file = input.files[0];

    if (!file) {
        alert("Select file ❌");
        return;
    }

    if (!editor) {
        alert("Editor not ready ❌");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
        editor.setValue(e.target.result);

        currentFileName = file.name;
        currentFileId = null; // IMPORTANT

        const ext = file.name.split('.').pop().toLowerCase();
        setEditorLanguage(ext);
    };

    reader.readAsText(file);
}

// 🔥 OPEN PROJECT FILE
function openFile(fileId) {
    fetch(`/editor/file/${fileId}`)
        .then(res => res.json())
        .then(data => {

            if (data.error) {
                alert(data.error);
                return;
            }

            if (!editor) {
                alert("Editor not ready ❌");
                return;
            }

            editor.setValue(data.content);

            // 🔥 IMPORTANT FIX
            currentFileId = fileId;
            currentFileName = null;

            console.log("Opened file:", data.filename);
        })
        .catch(err => console.error(err));
}

// 🔥 SAVE LOGIC
function saveAsVersion() {

    if (!editor) {
        alert("Editor not ready ❌");
        return;
    }

    const code = editor.getValue();
    const message = prompt("Enter commit message:");

    if (!message) {
        alert("Commit message required ❌");
        return;
    }

    // ✅ EXISTING FILE
    if (currentFileId) {

        fetch(`/editor/save/${currentFileId}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code,
                message: message
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("✅ Saved as new version!");
            } else {
                alert("❌ Error saving");
            }
        });

    }

    // ✅ NEW UPLOADED FILE
    else if (currentFileName) {

        fetch(`/editor/save_new/{{ project.id }}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code,
                filename: currentFileName,
                message: message
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("✅ File added as new project file!");
            } else {
                alert("❌ Error saving");
            }
        });

    }

    else {
        alert("No file to save ❌");
    }
}
</script>
{% endblock %}
