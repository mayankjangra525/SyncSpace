{% extends "base.html" %}

{% block content %}

<h1 class="text-3xl mb-6">📁 Project Drive - {{ project.name }}</h1>

<!-- 📤 UPLOAD -->
<form method="POST" enctype="multipart/form-data" class="mb-6">
    <input type="file" name="file" required>
    <input type="text" name="message" placeholder="Commit message (optional)">
    <button class="bg-primary px-4 py-2 rounded-lg">Upload</button>
</form>

<!-- 📂 FILE LIST -->
<div class="grid md:grid-cols-2 gap-4">
    {% for file in files %}
    <div class="bg-dark-800 p-4 rounded-xl card-hover">

        <h3>{{ file.filename }}</h3>
        <p class="text-gray-400 text-sm">
            Version: {{ file.version }}
        </p>

     <a href="{{ url_for('drive_download', file_id=file.id) }}"
   class="text-primary">
    Download
</a>

    </div>
    {% endfor %}
</div>

{% endblock %}
