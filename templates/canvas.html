<!DOCTYPE html>
<html>
<head>
    <title>Canvas</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <script>tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: {
              900: "#080808",
              800: "#111111",
              700: "#171717",
            },
            primary: "#6366f1"
          }
        }
      }
    }
    </script>
</head>
<body>
<h3>Online Users:</h3>
<ul id="users"></ul>
<h2>Canvas - {{ project.name }}</h2>

<canvas id="board" width="800" height="500" style="border:1px solid black;"></canvas>

<br><br>

<button onclick="clearCanvas()">Clear</button>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const socket = io();

const projectId = "{{ project.id }}".toString();

// Join room
socket.emit('join', { project_id: projectId });

let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => {
    drawing = false;
    saveCanvas();
});

canvas.addEventListener("mousemove", draw);

function draw(e) {
    if (!drawing) return;

    const x = e.offsetX;
    const y = e.offsetY;

    ctx.fillRect(x, y, 2, 2);

    // SEND to others
    socket.emit('draw', {
        x: x,
        y: y,
        project_id: projectId
    });
}

// RECEIVE from others
socket.on('draw', function(data) {
    ctx.fillRect(data.x, data.y, 2, 2);
});

// SAVE (same as before)
function saveCanvas() {
    const data = canvas.toDataURL();

    fetch("", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ data: data })
    });
}

// LOAD (same as before)
window.onload = function() {
    const savedData = "{{ canvas_data }}";

    if (savedData && savedData !== "None") {
        const img = new Image();
        img.src = savedData;
        img.onload = () => ctx.drawImage(img, 0, 0);
    }
}

// CLEAR
function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    saveCanvas();
}
socket.emit('join', {
    project_id: projectId,
    username: "{{ current_user.username }}"
});
socket.on('update_users', function(users) {
    const usersList = document.getElementById("users");
    usersList.innerHTML = "";

    users.forEach(user => {
        const li = document.createElement("li");
        li.textContent = user;
        usersList.appendChild(li);
    });
});
</script>
