<!DOCTYPE html>
<html>
<head>
    <title>Canvas</title>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial;
        }

        canvas {
            border: 1px solid black;
        }

        .tool-btn {
            padding: 8px 12px;
            margin: 5px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }

        .tool-btn.active {
            background: #007bff;
            color: white;
            border: 2px solid black;
        }

        .cursor {
            position: absolute;
            font-size: 12px;
            color: red;
            pointer-events: none;
        }
    </style>
</head>

<body>

<h2>Canvas - {{ project.name }}</h2>

<!-- 🟢 ONLINE USERS -->
<h3>Online Users:</h3>
<ul id="users"></ul>

<!-- 🧰 TOOLS -->
<div>
    <button class="tool-btn" onclick="setTool('pen', event)">Pen</button>
    <button class="tool-btn" onclick="setTool('eraser', event)">Eraser</button>

    <input type="color" id="colorPicker">
    <input type="range" id="sizePicker" min="1" max="10" value="2">
</div>

<!-- 🎯 MAIN LAYOUT -->
<div style="display:flex; gap:20px; margin-top:10px;">

    <!-- 🎨 CANVAS -->
    <div>
        <canvas id="board" width="800" height="500"></canvas>
        <br>
        <button onclick="clearCanvas()">Clear</button>
    </div>

    <!-- 💬 CHAT -->
    <div style="width:250px;">
        <h4>💬 Chat</h4>

        <div id="chat-box" style="height:300px; overflow-y:scroll; border:1px solid #ccc;"></div>

        <input type="text" id="chat-input" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<!-- 👀 CURSORS -->
<div id="cursors"></div>

<script>
let lastX = 0;
let lastY = 0;

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const socket = io();
const projectId = "{{ project.id }}".toString();

let drawing = false;

// TOOL STATE
let currentTool = "pen";
let currentColor = "#000000";
let currentSize = 2;

// 🧰 TOOL SELECT
function setTool(tool, event) {
    currentTool = tool;

    document.querySelectorAll(".tool-btn").forEach(btn => {
        btn.classList.remove("active");
    });

    event.target.classList.add("active");
}

// 🎨 COLOR
document.getElementById("colorPicker").addEventListener("change", (e) => {
    currentColor = e.target.value;
});

// 📏 SIZE
document.getElementById("sizePicker").addEventListener("change", (e) => {
    currentSize = e.target.value;
});

// 🖱️ MOUSE EVENTS
canvas.addEventListener("mousedown", (e) => {
    drawing = true;
    lastX = e.offsetX;
    lastY = e.offsetY;
});

canvas.addEventListener("mouseup", () => {
    drawing = false;
    saveCanvas();
});

canvas.addEventListener("mouseleave", () => drawing = false);
canvas.addEventListener("mousemove", draw);

// ✏️ DRAW FUNCTION
function draw(e) {
    if (!drawing) return;

    const x = e.offsetX;
    const y = e.offsetY;

    drawLine(lastX, lastY, x, y, currentTool, currentColor, currentSize);

    socket.emit('draw', {
        x0: lastX,
        y0: lastY,
        x1: x,
        y1: y,
        tool: currentTool,
        color: currentColor,
        size: currentSize,
        project_id: projectId
    });

    lastX = x;
    lastY = y;

    // cursor tracking
    socket.emit('cursor_move', {
        x: x,
        y: y,
        username: "{{ current_user.username }}",
        project_id: projectId
    });
}

// 🧠 DRAW ENGINE
function drawLine(x0, y0, x1, y1, tool, color, size) {
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);

    ctx.lineWidth = size || 2;
    ctx.lineCap = "round";

    if (tool === "pen") {
        ctx.strokeStyle = color || "#000";
    } else if (tool === "eraser") {
        ctx.strokeStyle = "#FFFFFF";
    }

    ctx.stroke();
    ctx.closePath();
}

// 📡 RECEIVE DRAW
socket.on('draw', function(data) {
    drawLine(
        data.x0,
        data.y0,
        data.x1,
        data.y1,
        data.tool,
        data.color,
        data.size
    );
});

// 👥 JOIN ROOM
socket.emit('join', {
    project_id: projectId,
    username: "{{ current_user.username }}"
});

// 🟢 ONLINE USERS
socket.on('update_users', function(users) {
    const usersList = document.getElementById("users");
    usersList.innerHTML = "";

    users.forEach(user => {
        const li = document.createElement("li");
        li.textContent = user;
        usersList.appendChild(li);
    });
});

// 👀 CURSOR RECEIVE
const cursors = {};

socket.on('cursor_move', function(data) {
    let cursor = cursors[data.username];

    if (!cursor) {
        cursor = document.createElement("div");
        cursor.className = "cursor";
        cursor.innerText = data.username;
        document.body.appendChild(cursor);
        cursors[data.username] = cursor;
    }

    cursor.style.left = data.x + "px";
    cursor.style.top = data.y + "px";
});

// 💬 SEND MESSAGE
function sendMessage() {
    const input = document.getElementById("chat-input");
    const message = input.value;

    if (!message) return;

    socket.emit('send_message', {
        message: message,
        username: "{{ current_user.username }}",
        project_id: projectId
    });

    input.value = "";
}

// 📩 RECEIVE MESSAGE
socket.on('receive_message', function(data) {
    const box = document.getElementById("chat-box");

    const msg = document.createElement("div");
    msg.innerHTML = "<b>" + data.username + ":</b> " + data.message;

    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
});

// ⌨️ ENTER KEY
document.getElementById("chat-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

// 💾 SAVE
function saveCanvas() {
    const data = canvas.toDataURL();

    fetch("", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ data: data })
    });
}

// 🔄 LOAD
window.onload = function() {
    document.querySelector(".tool-btn").classList.add("active");

    const savedData = "{{ canvas_data }}";

    if (savedData && savedData !== "None") {
        const img = new Image();
        img.src = savedData;
        img.onload = () => ctx.drawImage(img, 0, 0);
    }
};

// 🧹 CLEAR
function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    saveCanvas();
}
</script>

</body>
</html>
